<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AG3 Research Agent - Professional Development Interface">
    <title>AG3 Research Agent</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-color: #121212;
            --pane-bg: #1e1e24;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --accent: #00f2ff; /* Default Neon - JS will override this via AG3_CONFIG */
            --border: #333;
            --chat-user: #2b2b36;
            --chat-llm: #ffffff10;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Left Pane Styling */
        .left-pane { width: 260px; background-color: var(--pane-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: margin-left 0.3s ease; }
        .left-pane.collapsed { margin-left: -260px; border-right: none; }

        /* Center Console Styling */
        .center-console { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-color); position: relative; }

        /* DYNAMIC VERSION BANNER (New Feature) */
        #versionBanner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            transition: all 0.5s ease;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: var(--pane-bg); border-bottom: 1px solid var(--border); }

        .chat-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        /* Message Styling */
        .message-item { max-width: 85%; padding: 15px; border-radius: 12px; line-height: 1.6; position: relative; cursor: pointer; transition: transform 0.2s; }
        .message-item:hover { transform: scale(1.005); }
        .user-message { align-self: flex-end; background: var(--chat-user); border-bottom-right-radius: 2px; }
        .llm-message { align-self: flex-start; background: var(--chat-llm); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .message-source { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; opacity: 0.6; letter-spacing: 1px; }

        /* Input area */
        .input-area { padding: 20px; border-top: 1px solid var(--border); background-color: var(--bg-color); display: flex; gap: 15px; align-items: center; }
        .main-input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--pane-bg); color: var(--text-main); outline: none; }
        .main-input:focus { border-color: var(--accent); }
        .send-btn { background-color: var(--accent); color: #000; border: none; padding: 15px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* CODE BLOCK STYLING */
        .code-container { position: relative; background: #000; border-radius: 8px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 15px; font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .copy-btn { background: #444; color: #eee; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .copy-btn.copy-success { background-color: #28a745 !important; }
        pre { margin: 0 !important; padding: 15px !important; background: transparent !important; }

        /* Right Pane */
        .right-pane { width: 300px; background-color: var(--pane-bg); border-left: 1px solid var(--border); padding: 20px; transition: margin-right 0.3s ease; overflow-y: auto; }
        .right-pane.collapsed { margin-right: -300px; border-left: none; }

        /* Utility Buttons */
        .pane-btn { width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 0.9rem; }
        .icon-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 600; }

        /* Ensure the dropdown options remain readable */
        #modelSelect option {
            background-color: #1e1e24; /* Dark background for the list */
            color: #fff;              /* White text for the list */
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <div class="left-pane" id="leftPane">
        <h2 style="color: var(--accent);">AG3 Agent</h2>
        <input type="text" id="leftSearch" class="pane-btn" style="text-align: left;" placeholder="Search memory...">
        <button class="pane-btn" id="btnRAG">Memory (RAG)</button>
        <button class="pane-btn" id="btnScraper">Fetch Scraper Data</button>
        <button class="pane-btn" id="btnFakeLLM">Fetch LLM Response</button>
    </div>

    <div class="center-console">
        <div id="versionBanner"></div>

        <div class="top-bar">
            <button class="icon-btn" id="toggleLeftBtn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"></path></svg>
                Menu
            </button>
            <button id="btnClearChat" class="pane-btn" style="width: auto; margin-bottom:0; color: #ffcccc; border-color: #ff4c4c50;">Clear Chat</button>
            <button class="icon-btn" id="toggleRightBtn">
                Notes
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2zm0 2v14h14V5H5zm2 2h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"></path></svg>
            </button>
        </div>

        <div class="chat-display" id="chatDisplay"></div>

        <div class="input-area">
            <select id="modelSelect" class="pane-btn" style="width: auto; margin-bottom: 0;">
                <option value="default">Loading Models...</option>
            </select>
            <input type="text" id="chatInput" class="main-input" placeholder="Message the Agent...">
            <button id="sendBtn" class="send-btn">Send</button>
        </div>
    </div>

    <div class="right-pane collapsed" id="rightPane">
        <h2 style="color: var(--accent);">Saved Notes</h2>
        <div style="display: flex; gap: 10px; margin: 15px 0;">
            <button id="btnExportMarkdown" class="pane-btn" style="background: var(--accent); color: #000; font-weight: bold;">Export MD</button>
            <button id="btnClearNotes" class="pane-btn" style="color: #ffcccc;">Clear</button>
        </div>
        <div id="savedItemsContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="/frontend/script.js"></script>
</body>

</html>
